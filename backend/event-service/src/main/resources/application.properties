spring.application.name=event-service
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:../data/events.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

AUTH_ISSUER_URI=${AUTH_ISSUER_URI:http://localhost:8081/realms/kulturnatten-dev}
AUTH_JWK_SET_URI=${AUTH_JWK_SET_URI:http://localhost:8081/realms/kulturnatten-dev/protocol/openid-connect/certs}

management.endpoints.web.exposure.include=health
