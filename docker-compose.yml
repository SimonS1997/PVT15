services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: kulturnatten-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./backend/kulturnatten-auth/realm-export.json:/opt/keycloak/data/import/kulturnatten-dev-realm.json:ro
    command: start-dev --import-realm

  event-service:
    build: ./backend/event-service
    container_name: kulturnatten-event-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/events.db
      AUTH_ISSUER_URI: http://localhost:8081/realms/kulturnatten-dev
      AUTH_JWK_SET_URI: http://keycloak:8080/realms/kulturnatten-dev/protocol/openid-connect/certs
    volumes:
      - ./data:/data
    depends_on:
      - keycloak
    restart: on-failure

  transit-service:
    build: ./backend/transit-service
    container_name: kulturnatten-transit-service
    ports:
      - "8083:8083"
    environment:
      AUTH_ISSUER_URI: http://localhost:8081/realms/kulturnatten-dev
      AUTH_JWK_SET_URI: http://keycloak:8080/realms/kulturnatten-dev/protocol/openid-connect/certs
    depends_on:
      - keycloak
    restart: on-failure

  plan-service:
    build: ./backend/plan-service
    container_name: kulturnatten-plan-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/plans.db
      AUTH_ISSUER_URI: http://localhost:8081/realms/kulturnatten-dev
      AUTH_JWK_SET_URI: http://keycloak:8080/realms/kulturnatten-dev/protocol/openid-connect/certs
    volumes:
      - ./data:/data
    depends_on:
      - keycloak
    restart: on-failure
