services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: kulturnatten-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8081:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/kulturnatten-dev-realm.json:ro
    command: start-dev --import-realm
